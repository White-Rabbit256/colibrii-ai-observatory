<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="30%" stop-color="#f0f2ff"/>
      <stop offset="60%" stop-color="#fdf0f8"/>
      <stop offset="100%" stop-color="#f0faff"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Top gradient bar -->
  <rect width="1200" height="4" fill="url(#bar)"/>
  <!-- Decorative orbs -->
  <circle cx="900" cy="200" r="250" fill="#0ea5e9" opacity="0.04"/>
  <circle cx="300" cy="450" r="200" fill="#8b5cf6" opacity="0.03"/>
  <circle cx="1050" cy="500" r="180" fill="#ec4899" opacity="0.03"/>
  <!-- Logo text -->
  <text x="80" y="200" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="72" fill="url(#grad)">Colibrii Labs</text>
  <!-- Subtitle -->
  <text x="80" y="270" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="36" fill="#1a1a2e">AI Observatory — Costa Rica</text>
  <!-- Description -->
  <text x="80" y="340" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="22" fill="#4a4a6a">Real-time strategic AI intelligence</text>
  <text x="80" y="375" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="22" fill="#4a4a6a">20 countries  ·  17+ data sources  ·  7 algorithms  ·  46-term glossary</text>
  <!-- Stats badges -->
  <rect x="80" y="420" width="160" height="55" rx="10" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>
  <text x="110" y="440" font-family="'IBM Plex Mono', monospace" font-weight="700" font-size="12" fill="#0ea5e9">CAPI-CR INDEX</text>
  <text x="110" y="465" font-family="'IBM Plex Mono', monospace" font-weight="700" font-size="18" fill="#1a1a2e">20 Countries</text>

  <rect x="260" y="420" width="160" height="55" rx="10" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
  <text x="290" y="440" font-family="'IBM Plex Mono', monospace" font-weight="700" font-size="12" fill="#8b5cf6">LIVE DATA</text>
  <text x="290" y="465" font-family="'IBM Plex Mono', monospace" font-weight="700" font-size="18" fill="#1a1a2e">4 APIs</text>

  <rect x="440" y="420" width="180" height="55" rx="10" fill="#ec4899" opacity="0.08" stroke="#ec4899" stroke-width="1" opacity="0.3"/>
  <text x="470" y="440" font-family="'IBM Plex Mono', monospace" font-weight="700" font-size="12" fill="#ec4899">WEF 2026</text>
  <text x="470" y="465" font-family="'IBM Plex Mono', monospace" font-weight="700" font-size="18" fill="#1a1a2e">Risk Data</text>

  <!-- Bottom bar -->
  <rect y="610" width="1200" height="20" fill="url(#bar)" opacity="0.3"/>
  <!-- URL -->
  <text x="80" y="560" font-family="'IBM Plex Mono', monospace" font-weight="500" font-size="16" fill="#8a8aaa">colibriilabs.com</text>
  <!-- Flag -->
  <text x="1050" y="560" font-family="system-ui" font-size="48">🇨🇷</text>
</svg>
